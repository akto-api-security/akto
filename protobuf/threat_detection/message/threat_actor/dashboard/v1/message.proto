syntax = "proto3";

package threat_detection.message.threat_actor.dashboard.v1;

option java_outer_classname = "ThreatActorDashboardProto";
option java_package = "threat_detection.message.threat_actor.dashboard.v1";

message DashboardThreatActor {
  string id = 1;
  string latest_api_ip = 2;
  string latest_api_endpoint = 3;
  string latest_api_method = 4;
  uint64 discovered_at = 5;
}
