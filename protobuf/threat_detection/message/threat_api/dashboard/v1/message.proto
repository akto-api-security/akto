syntax = "proto3";

package threat_detection.message.threat_api.dashboard.v1;

option java_outer_classname = "ThreatApiDashboardProto";
option java_package = "threat_detection.message.threat_api.dashboard.v1";

message DashboardThreatApi {
    string endpoint = 1;
    string method = 2;
    uint64 discovered_at = 3;
    uint32 actors_count = 4;
    uint32 requests_count = 5;
}
