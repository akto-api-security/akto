# NewRelic Integration Configuration
# Use: java ... -Dspring.profiles.active=newrelic
# Or set SPRING_PROFILES_ACTIVE=newrelic

# Feature flag: Enable/disable NewRelic integration
newrelic.integration.enabled=${NEWRELIC_INTEGRATION_ENABLED:false}

# Encryption key for API key encryption (32 bytes base64 AES-256)
# Required if newrelic.integration.enabled=true
newrelic.encryption.key=${NEWRELIC_ENCRYPTION_KEY:}

# HTTP API timeout for NewRelic API calls (milliseconds)
# Valid range: 1000-60000 (1-60 seconds)
newrelic.api.timeout.ms=${NEWRELIC_API_TIMEOUT_MS:10000}

# Maximum metrics per API request batch to NewRelic
# Valid range: 100-10000
newrelic.max.batch.size=${NEWRELIC_MAX_BATCH_SIZE:1000}

# Metrics export interval in seconds
# How often to export metrics to NewRelic
# Valid range: 5-3600 seconds
newrelic.metrics.export.interval.sec=${NEWRELIC_METRICS_EXPORT_INTERVAL_SEC:60}

# Kafka configuration
kafka.consumer.group=${KAFKA_CONSUMER_GROUP:akto-newrelic-metrics-export}
kafka.bootstrap.servers=${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
kafka.topic.runtime-metrics=api-runtime-metrics

# MongoDB configuration
spring.data.mongodb.uri=${MONGODB_URI:mongodb://localhost:27017/akto}

# Logging
newrelic.log.level=${NEWRELIC_LOG_LEVEL:INFO}
logging.level.com.akto.integration=INFO
logging.level.com.akto.integration.services=INFO
