# Tuned for n2d-highcpu-16 (16 vCPU, 16 GB) — blocking http-proxy + guardrails path.
#
# Each request holds a servlet thread until GuardrailsClient returns (~1-3s).
#   maxThreads >= peak_rps * p95_handler_seconds * 1.2
#   300 rps * 3.5s ≈ 1260 → 1200 with -Xss512k (~600 MB thread stacks at peak)
#
# Runtime override (no rebuild):
#   jetty.threadPool.maxThreads=1500
#
# Pair with docker mem_limit ~15g and docker/set-jvm-opts.sh (auto -Xmx from cgroup).

jetty.threadPool.minThreads=256
jetty.threadPool.maxThreads=1200
jetty.threadPool.idleTimeout=120000

jetty.http.acceptQueueSize=4096
jetty.http.acceptors=8
jetty.http.selectors=16
