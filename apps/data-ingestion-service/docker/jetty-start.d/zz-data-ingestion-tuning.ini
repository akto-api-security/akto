# Jetty 12 + threadpool-virtual — blocking http-proxy + guardrails on virtual threads.
#
# Platform threads handle accept/select/internal Jetty work; servlet handlers run on VTs.
# maxConcurrentTasks bounds in-flight blocking work (Little's Law: peak_rps * p95_seconds).
#   1667 rps * 3s ≈ 5000 → default 6000 with headroom
#
# Runtime override (no rebuild):
#   jetty.threadPool.virtual.maxConcurrentTasks=8000
#
# Selectors must stay below carrier thread count (see set-jvm-opts.sh parallelism).

jetty.threadPool.minThreads=64
jetty.threadPool.maxThreads=256
jetty.threadPool.idleTimeout=120000

jetty.threadPool.virtual.maxConcurrentTasks=6000
jetty.threadPool.virtual.tracking=false

jetty.http.acceptQueueSize=8192
jetty.http.acceptors=8
jetty.http.selectors=8
