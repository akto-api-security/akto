services:
  python-service:
    build:
      context: ./python-service/container
      dockerfile: Dockerfile
    container_name: agent-guard-python
    ports:
      - "127.0.0.1:8092:8092"
    environment:
      - PYTHONUNBUFFERED=1
      - PORT=8092
      - HF_HOME=/app/.cache/huggingface
      # LLM scanner config (consumed by container/src/llm_scanner.py).
      # When SCANNER_LLM_PROVIDER is unset, only the local ML path runs.
      - SCANNER_LLM_PROVIDER=${SCANNER_LLM_PROVIDER:-}
      - FORCE_LLM_MODE=${FORCE_LLM_MODE:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - OPENAI_MODEL=${OPENAI_MODEL:-}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - ANTHROPIC_MODEL=${ANTHROPIC_MODEL:-}
      - VERTEX_AI_PROJECT=${VERTEX_AI_PROJECT:-}
      - VERTEX_AI_LOCATION=${VERTEX_AI_LOCATION:-}
      - VERTEX_AI_ENDPOINT_ID=${VERTEX_AI_ENDPOINT_ID:-}
      - VERTEX_AI_SA_KEY_JSON=${VERTEX_AI_SA_KEY_JSON:-}
      - VERTEX_AI_DEDICATED_DNS=${VERTEX_AI_DEDICATED_DNS:-}
      - GEMMA_VERTEX_SA_KEY_JSON=${GEMMA_VERTEX_SA_KEY_JSON:-}
      - GEMMA_VERTEX_PROJECT=${GEMMA_VERTEX_PROJECT:-}
      - GEMMA_VERTEX_LOCATION=${GEMMA_VERTEX_LOCATION:-}
      - GEMMA_VERTEX_ENDPOINT_ID=${GEMMA_VERTEX_ENDPOINT_ID:-}
      - GEMMA_VERTEX_DEDICATED_DNS=${GEMMA_VERTEX_DEDICATED_DNS:-}
      # Cascade scanner (Qwen + Gemma + Haiku). When CASCADE_MODE_ENABLED is
      # truthy, PromptInjection/BanTopics requests fan out to all three in
      # parallel; fast-pass when Qwen+Gemma both vote safe with decision
      # confidence above their thresholds, else Haiku is authoritative.
      - CASCADE_MODE_ENABLED=${CASCADE_MODE_ENABLED:-}
      - CASCADE_QWEN_MIN_CONFIDENCE=${CASCADE_QWEN_MIN_CONFIDENCE:-}
      - CASCADE_GEMMA_MIN_CONFIDENCE=${CASCADE_GEMMA_MIN_CONFIDENCE:-}
      - CASCADE_TIMEOUT_MS=${CASCADE_TIMEOUT_MS:-}
      # OpenAI-compatible base URL — set to http://host.docker.internal:11434/v1
      # to use a locally running Ollama instance from inside the container.
      - OPENAI_COMPATIBLE_BASE_URL=${OPENAI_COMPATIBLE_BASE_URL:-}
    volumes:
      - model-cache:/app/.cache/huggingface
    deploy:
      resources:
        limits:
          cpus: '4'
          memory: 6G
        reservations:
          memory: 2G
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8092/health')"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s
    networks:
      - agent-guard-network

