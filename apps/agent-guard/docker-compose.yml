services:
  python-service:
    build:
      context: ./python-service/container
      dockerfile: Dockerfile
    container_name: agent-guard-python
    ports:
      - "127.0.0.1:8092:8092"
    environment:
      - PYTHONUNBUFFERED=1
      - PORT=8092
      - HF_HOME=/app/.cache/huggingface
      # LLM scanner config (consumed by container/src/llm_scanner.py).
      # When SCANNER_LLM_PROVIDER is unset, only the local ML path runs.
      - SCANNER_LLM_PROVIDER=${SCANNER_LLM_PROVIDER:-}
      - FORCE_LLM_MODE=${FORCE_LLM_MODE:-}
      
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - OPENAI_MODEL=${OPENAI_MODEL:-}
      
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - ANTHROPIC_MODEL=${ANTHROPIC_MODEL:-}
      
      - VERTEX_AI_PROJECT=${VERTEX_AI_PROJECT:-}
      - VERTEX_AI_LOCATION=${VERTEX_AI_LOCATION:-}
      - VERTEX_AI_ENDPOINT_ID=${VERTEX_AI_ENDPOINT_ID:-}
      - VERTEX_AI_SA_KEY_JSON=${VERTEX_AI_SA_KEY_JSON:-}
      
      - GEMMA_VERTEX_SA_KEY_JSON=${GEMMA_VERTEX_SA_KEY_JSON:-}
      - GEMMA_VERTEX_PROJECT=${GEMMA_VERTEX_PROJECT:-}
      - GEMMA_VERTEX_LOCATION=${GEMMA_VERTEX_LOCATION:-}
      - GEMMA_VERTEX_ENDPOINT_ID=${GEMMA_VERTEX_ENDPOINT_ID:-}
      - GEMMA_VERTEX_DEDICATED_DNS=${GEMMA_VERTEX_DEDICATED_DNS:-}
      
      - QWEN3GUARD_SA_KEY_JSON=${QWEN3GUARD_SA_KEY_JSON:-}
      - QWEN3GUARD_PROJECT=${QWEN3GUARD_PROJECT:-}
      - QWEN3GUARD_LOCATION=${QWEN3GUARD_LOCATION:-}
      - QWEN3GUARD_ENDPOINT_ID=${QWEN3GUARD_ENDPOINT_ID:-}
      - QWEN3GUARD_DEDICATED_DNS=${QWEN3GUARD_DEDICATED_DNS:-}
      # Ollama / CPU-based async evaluation (used for WARN/ALERT policy deferral).
      # Override these to point at a different Ollama instance or model.
      - OLLAMA_BASE_URL=${OLLAMA_BASE_URL:-http://jarvis.akto.io/v1}
      - OLLAMA_MODEL=${OLLAMA_MODEL:-gemma4:e4b}
      # Generic OpenAI-compatible base URL (used when SCANNER_LLM_PROVIDER=openai_compatible).
      - OPENAI_COMPATIBLE_BASE_URL=${OPENAI_COMPATIBLE_BASE_URL:-}
      # DB abstractor endpoint for persisting per-model results when
      # config.storeAllResults=true (POST /api/storeGuardrailModelResults).
      - DATABASE_ABSTRACTOR_SERVICE_URL=${DATABASE_ABSTRACTOR_SERVICE_URL:-}
      - SLACK_WEBHOOK_URL=${SLACK_WEBHOOK_URL:-}
    volumes:
      - model-cache:/app/.cache/huggingface
    deploy:
      resources:
        limits:
          cpus: '4'
          memory: 6G
        reservations:
          memory: 2G
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8092/health')"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s
    networks:
      - agent-guard-network

networks:
  agent-guard-network:
    driver: bridge

volumes:
  model-cache:
    driver: local

