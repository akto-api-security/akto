services:
  executor:
    image: aktosecurity/akto-agent-guard-worker:${AGENT_GUARD_WORKER_TAG:-local}
    build:
      context: ./python-service/worker-py
      dockerfile: Dockerfile
    container_name: agent-guard-executor
    ports:
      - "127.0.0.1:8090:8090"
    env_file:
      - .env
    environment:
      ANONYMIZER_URL: http://anonymizer:8093
    depends_on:
      anonymizer:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8090/health')"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 15s
    networks:
      - agent-guard-network

  anonymizer:
    image: aktosecurity/akto-agent-guard-anonymizer:${AGENT_GUARD_ANONYMIZER_TAG:-local}
    build:
      context: ./python-service/anonymizer-container
      dockerfile: Dockerfile
    container_name: agent-guard-anonymizer
    expose:
      - "8093"
    environment:
      ANONYMIZER_DIAGNOSTICS: ${ANONYMIZER_DIAGNOSTICS:-true}
      ANONYMIZER_LOG_LEVEL: ${ANONYMIZER_LOG_LEVEL:-info}
      ANONYMIZER_SLOW_MS: ${ANONYMIZER_SLOW_MS:-200}
      ANONYMIZER_WORKERS: ${ANONYMIZER_WORKERS:-4}
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8093/health')"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 60s
    networks:
      - agent-guard-network

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:latest
    container_name: agent-guard-cadvisor
    privileged: true
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
    ports:
      - "127.0.0.1:8080:8080"
    networks:
      - agent-guard-network

  prometheus:
    image: prom/prometheus:latest
    container_name: agent-guard-prometheus
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "127.0.0.1:9090:9090"
    networks:
      - agent-guard-network

  grafana:
    image: grafana/grafana:latest
    container_name: agent-guard-grafana
    volumes:
      - ./monitoring/grafana-datasource.yml:/etc/grafana/provisioning/datasources/datasource.yml:ro
      - ./monitoring/grafana-dashboards-provider.yml:/etc/grafana/provisioning/dashboards/provider.yml:ro
      - ./monitoring/dashboards:/etc/grafana/provisioning/dashboards/files:ro
    ports:
      - "127.0.0.1:3000:3000"
    depends_on:
      - prometheus
    networks:
      - agent-guard-network

networks:
  agent-guard-network:
    driver: bridge
