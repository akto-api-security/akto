repos:
  - repo: local
    hooks:
      - id: ruff-check
        name: ruff check (agent-guard worker-py)
        entry: bash -c 'cd apps/agent-guard/python-service/worker-py && uv run ruff check .'
        language: system
        files: ^apps/agent-guard/python-service/worker-py/.*\.py$
        pass_filenames: false
      - id: ruff-format
        name: ruff format (agent-guard worker-py)
        entry: bash -c 'cd apps/agent-guard/python-service/worker-py && uv run ruff format .'
        language: system
        files: ^apps/agent-guard/python-service/worker-py/.*\.py$
        pass_filenames: false
      - id: mypy
        name: mypy (agent-guard worker-py)
        entry: bash -c 'cd apps/agent-guard/python-service/worker-py && uv run mypy src'
        language: system
        files: ^apps/agent-guard/python-service/worker-py/.*\.py$
        pass_filenames: false
      - id: pytest
        name: pytest (agent-guard worker-py)
        entry: bash -c 'cd apps/agent-guard/python-service/worker-py && ./tests/run.sh'
        language: system
        files: ^apps/agent-guard/python-service/worker-py/.*\.py$
        pass_filenames: false
