# Anonymizer only — Presidio PII redaction service.
services:
  anonymizer:
    image: aktosecurity/akto-agent-guard-anonymizer:${AGENT_GUARD_ANONYMIZER_TAG:-local}
    build:
      context: .
      dockerfile: Dockerfile
    container_name: agent-guard-anonymizer
    ports:
      - "127.0.0.1:8093:8093"
    environment:
      ANONYMIZER_DIAGNOSTICS: ${ANONYMIZER_DIAGNOSTICS:-true}
      ANONYMIZER_LOG_LEVEL: ${ANONYMIZER_LOG_LEVEL:-info}
      ANONYMIZER_SLOW_MS: ${ANONYMIZER_SLOW_MS:-200}
      ANONYMIZER_WORKERS: ${ANONYMIZER_WORKERS:-4}
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8093/health')"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 60s
