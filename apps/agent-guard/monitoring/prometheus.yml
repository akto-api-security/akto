scrape_configs:
  - job_name: agent-guard-executor
    scrape_interval: 15s
    static_configs:
      - targets: ["executor:8090"]

  # Container CPU/RAM/network/disk for every container on this host.
  - job_name: cadvisor
    scrape_interval: 15s
    static_configs:
      - targets: ["cadvisor:8080"]
