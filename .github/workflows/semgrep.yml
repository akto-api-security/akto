# Name of this GitHub Actions workflow.
name: Semgrep

on:
  # Diff-aware (delta) scan: only findings introduced by the PR changes.
  pull_request: {}
  workflow_dispatch: {}

jobs:
  semgrep:
    name: semgrep/ci
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: read

    container:
      image: semgrep/semgrep

    if: (github.actor != 'dependabot[bot]')

    steps:
      # Full history is required so Semgrep can compute the PR / master merge-base.
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      # Diff-only keeps Pro/interfile affordable vs a full-repo scan.
      # pull_request → Semgrep auto diff-aware scan.
      # workflow_dispatch → force delta vs origin/master via --baseline-commit.
      - name: Run Semgrep
        id: semgrep
        env:
          SEMGREP_APP_TOKEN: ${{ secrets.SEMGREP_APP_TOKEN }}
          EVENT_NAME: ${{ github.event_name }}
        run: |
          set -euo pipefail

          BASELINE_ARGS=()
          if [ "${EVENT_NAME}" != "pull_request" ]; then
            git fetch --no-tags origin master:refs/remotes/origin/master
            BASELINE_COMMIT="$(git merge-base HEAD origin/master)"
            BASELINE_ARGS=(--baseline-commit "${BASELINE_COMMIT}")
            echo "Delta Pro scan vs master (baseline=${BASELINE_COMMIT})"
          else
            echo "Delta Pro scan via pull_request event (Semgrep diff-aware mode)"
          fi

          JOBS="$(nproc)"
          echo "Using jobs=${JOBS}"
          semgrep ci \
            "${BASELINE_ARGS[@]}" \
            --jobs "${JOBS}" \
            --json-output=semgrep-results.json

      - name: Write Actions job summary
        if: always()
        env:
          REPO: ${{ github.repository }}
          REF: ${{ github.ref }}
          EVENT_NAME: ${{ github.event_name }}
        run: |
          python3 <<'PY'
          import json
          import os
          import pathlib
          from collections import Counter

          repo = os.environ["REPO"]
          ref = os.environ["REF"]
          event = os.environ.get("EVENT_NAME", "")
          findings_url = (
              f"https://semgrep.dev/orgs/akto-api-security/findings"
              f"?repo={repo}&ref={ref}"
          )
          sca_url = (
              f"https://semgrep.dev/orgs/akto-api-security/supply-chain/vulnerabilities"
              f"?repo={repo}&ref={ref}"
          )

          lines = [
              "## Semgrep results",
              "",
              f"- **Scan mode:** delta + Pro (changed code only; event=`{event}`)",
              f"- [Findings dashboard]({findings_url})",
              f"- [Supply chain dashboard]({sca_url})",
              "",
          ]

          results_path = pathlib.Path("semgrep-results.json")
          if not results_path.exists():
              lines.append("_No results file produced; see job logs for details._")
              with open(os.environ["GITHUB_STEP_SUMMARY"], "a", encoding="utf-8") as summary:
                  summary.write("\n".join(lines) + "\n")
              raise SystemExit(0)

          with results_path.open() as f:
              data = json.load(f)

          results = data.get("results") or []
          errors = data.get("errors") or []
          scanned = (data.get("paths") or {}).get("scanned") or []
          by_severity = Counter(
              (r.get("extra") or {}).get("severity", "UNKNOWN").upper()
              for r in results
          )
          by_rule = Counter(r.get("check_id", "unknown") for r in results)

          lines.extend(
              [
                  "### Summary",
                  "",
                  f"- **Findings:** {len(results)}",
                  f"- **Targets scanned:** {len(scanned)}",
                  f"- **Scan errors:** {len(errors)}",
                  "",
                  "### By severity",
                  "",
              ]
          )
          if by_severity:
              for severity, count in sorted(
                  by_severity.items(), key=lambda item: (-item[1], item[0])
              ):
                  lines.append(f"- `{severity}`: {count}")
          else:
              lines.append("- None")

          lines.extend(["", "### Top rules", ""])
          if by_rule:
              for rule, count in by_rule.most_common(10):
                  lines.append(f"- `{rule}`: {count}")
          else:
              lines.append("- None")

          lines.extend(
              [
                  "",
                  "### Sample findings",
                  "",
                  "| Severity | Rule | Location |",
                  "| --- | --- | --- |",
              ]
          )
          for result in results[:15]:
              severity = (result.get("extra") or {}).get("severity", "UNKNOWN")
              rule = result.get("check_id", "unknown")
              path = result.get("path", "?")
              line = ((result.get("start") or {}).get("line")) or "?"
              lines.append(f"| {severity} | `{rule}` | `{path}:{line}` |")
          if not results:
              lines.append("| — | — | — |")
          elif len(results) > 15:
              lines.append(f"| … | … | +{len(results) - 15} more in dashboard |")

          with open(os.environ["GITHUB_STEP_SUMMARY"], "a", encoding="utf-8") as summary:
              summary.write("\n".join(lines) + "\n")
          PY
