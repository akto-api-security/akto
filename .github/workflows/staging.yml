name: Staging

env:
  GCP_REGION: ${{ vars.GCP_REGION || 'us-central1' }}
  GAR_REGISTRY: ${{ vars.GCP_REGION || 'us-central1' }}-docker.pkg.dev/${{ vars.GCP_PROJECT_ID }}/${{ vars.GCP_ARTIFACT_REGISTRY_REPO }}

# Controls when the workflow will run
on:
  push:
    branches: [master]
  pull_request_review:
    types: [ submitted ]
  workflow_dispatch:
    inputs:
      target:
        description: 'Build target (PR review always runs all)'
        required: true
        default: all
        type: choice
        options:
          - all
          - main
          - guardrails-service
          - agent-guard
          - agent-guard-worker
          - agent-guard-anonymizer
          - agent-guard-embedder
      skipTests:
        description: 'Skip unit tests'
        type: boolean
        default: false
      skipFrontendBuild:
        description: 'Skip dashboard frontend build and S3 sync'
        type: boolean
        default: false

jobs:
  check-dao-migration:
    if: (github.event.pull_request.base.ref == 'master' && github.event.review.state == 'approved') || (github.event_name == 'workflow_dispatch') || (github.event_name == 'push')
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v2
        with:
          fetch-depth: 0

      - name: Check DAO migration
        if: ${{ !contains(github.event.pull_request.labels.*.name, 'skip-dao-migration-check') }}
        run: |
          if [ -n "${{ github.event.pull_request.base.sha }}" ]; then
            BASE=${{ github.event.pull_request.base.sha }}
            HEAD=${{ github.event.pull_request.head.sha }}
          else
            # push / workflow_dispatch have no PR context - diff against the
            # previous commit on this ref instead.
            BASE=$(git rev-parse HEAD^ 2>/dev/null || git rev-list --max-parents=0 HEAD)
            HEAD=${{ github.sha }}
          fi

          # Only schema-affecting additions count, not any edit to a DAO file
          # (e.g. business-logic-only changes like an upsert-vs-update branch).
          SCHEMA_TOUCHED=$(git diff -U0 "$BASE"..."$HEAD" \
              -- 'libs/dao/src/main/java/com/akto/dao/*.java' 'libs/dao/src/main/java/com/akto/DaoInit.java' \
            | grep -E '^\+' \
            | grep -E 'createIndex|createIndicesIfAbsent|createUniqueIndex|createCollection|dropIndex|dropCollection|renameCollection|convertToCappedCollection|compactCollection' || true)
          if [ -z "$SCHEMA_TOUCHED" ]; then
            exit 0
          fi

          MIGRATION_ADDED=$(git diff --name-only --diff-filter=A "$BASE"..."$HEAD" \
            | grep -E "^libs/utils/src/main/resources/db/changelog/(common|billing|account)/.*\.xml$" || true)
          if [ -z "$MIGRATION_ADDED" ]; then
            echo "This change adds/changes an index or collection but no migration file was added under db/changelog/common|billing|account/. See libs/utils/src/main/resources/db/changelog/README.md."
            exit 1
          fi

          echo "Migration check passed: $MIGRATION_ADDED"

      - name: Send failure notification to Slack
        if: failure()
        uses: slackapi/slack-github-action@v1.23.0
        with:
          payload: |
            {
              "text": "❌ DAO migration check failed on Staging (${{ github.event_name }}, ${{ github.sha }}). Build blocked."
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK

  build:
    needs: check-dao-migration
    if: |
      (github.event_name == 'pull_request_review' && github.event.pull_request.base.ref == 'master' && github.event.review.state == 'approved') ||
      (github.event_name == 'workflow_dispatch' && (github.event.inputs.target == 'all' || github.event.inputs.target == 'main'))
    runs-on: ubuntu-22.04
    outputs:
      IMAGE_TAG: ${{ steps.docker_tag.outputs.IMAGE_TAG }}
    steps:
      - uses: actions/checkout@v2
      - uses: actions/setup-java@v2
        with:
          distribution: "adopt"
          java-version: "8"
          architecture: x64
      - uses: actions/setup-node@v2
        with:
          node-version: "17"
      - name: Setup Protoc
        uses: arduino/setup-protoc@v3
        with:
          version: "29.2"
          repo-token: ${{ secrets.GITHUB_TOKEN }}
      - uses: bufbuild/buf-action@v1
        with:
          setup_only: true
      - name: Convert github branch name to be compatible with docker tag name convention and generate tag name
        id: docker_tag
        run: echo "IMAGE_TAG=a-$(echo ${{ github.ref_name }} | sed 's/[^a-zA-Z0-9]/-/g')" >> $GITHUB_OUTPUT
      - name: Download Akto templates zip and PII files
        working-directory: ./apps/dashboard/src/main/resources
        run: |
          wget -O tests-library-master.zip https://github.com/akto-api-security/tests-library/archive/refs/heads/master.zip
          wget -O general.json https://raw.githubusercontent.com/akto-api-security/pii-types/master/general.json
          wget -O fintech.json https://raw.githubusercontent.com/akto-api-security/akto/master/pii-types/fintech.json
          wget -O filetypes.json https://raw.githubusercontent.com/akto-api-security/akto/master/pii-types/filetypes.json
      - name: Create maxmind directory
        run: mkdir -p ./apps/threat-detection-backend/src/main/resources/maxmind
      - name: Download Maxmind Country database
        working-directory: ./apps/threat-detection-backend/src/main/resources/maxmind
        run: |
          wget -O Geo-Country.mmdb https://raw.githubusercontent.com/akto-api-security/tests-library/refs/heads/master/resources/Geo-Country.mmdb
      
      - name: Create maxmind directory
        run: mkdir -p ./libs/utils/src/main/resources/maxmind
      - name: Download Maxmind Country database
        working-directory: ./libs/utils/src/main/resources/maxmind
        run: |
          wget -O Geo-Country.mmdb https://raw.githubusercontent.com/akto-api-security/tests-library/refs/heads/master/resources/Geo-Country.mmdb

      - name: Configure AWS Credentials (dashboard only)
        uses: aws-actions/configure-aws-credentials@v1
        with:
          aws-access-key-id: ${{secrets.AWS_ACCESS_KEY_ID}}
          aws-secret-access-key: ${{secrets.AWS_SECRET_ACCESS_KEY}}
          aws-region: ap-south-1

      - name: Download dashboard static assets
        run: bash apps/dashboard/scripts/download-dashboard-vendor-assets.sh

      - name: Build Dashboard polaris UI
        if: github.event_name != 'workflow_dispatch' || github.event.inputs.skipFrontendBuild != 'true'
        working-directory: ./apps/dashboard/web/polaris_web
        run: |
          npm install
          RELEASE_VERSION=${{ steps.docker_tag.outputs.IMAGE_TAG }} npm run build

      - name: Run mvn package
        if: github.event_name != 'workflow_dispatch' || github.event.inputs.skipTests != 'true'
        run: mvn package -Dakto-image-tag=${{ steps.docker_tag.outputs.IMAGE_TAG }} -Dakto-build-time=$(eval "date +%s") -Dakto-release-version=${{steps.docker_tag.outputs.IMAGE_TAG}}
      - name: Run mvn package (skip tests)
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.skipTests == 'true'
        run: mvn package -Dakto-image-tag=${{ steps.docker_tag.outputs.IMAGE_TAG }} -Dakto-build-time=$(eval "date +%s") -Dakto-release-version=${{steps.docker_tag.outputs.IMAGE_TAG}} -DskipTests

      - name: DockerHub login
        env:
          DOCKER_USERNAME: ${{secrets.DOCKER_USERNAME}}
          DOCKER_PASSWORD: ${{secrets.DOCKER_PASSWORD}}
        run: |
          docker login -u $DOCKER_USERNAME -p $DOCKER_PASSWORD
      - name: Authenticate to Google Cloud
        if: vars.GCP_PROJECT_ID != ''
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}
      - name: Set up Cloud SDK
        if: vars.GCP_PROJECT_ID != ''
        uses: google-github-actions/setup-gcloud@v2
      - name: Configure Docker for Artifact Registry
        if: vars.GCP_PROJECT_ID != ''
        run: gcloud auth configure-docker ${{ env.GCP_REGION }}-docker.pkg.dev --quiet
      - name: Build, tag, and push the image to DockerHub and Artifact Registry
        id: build-image-dockerhub
        env:
          ECR_REGISTRY: aktosecurity
          ECR_REPOSITORY: akto-api-security
          IMAGE_TAG: ${{ steps.docker_tag.outputs.IMAGE_TAG }}
          GAR_ENABLED: ${{ vars.GCP_PROJECT_ID != '' }}
        run: |
          set -euo pipefail
          echo $IMAGE_TAG >> $GITHUB_STEP_SUMMARY
          docker buildx create --use
          gar_tag() {
            if [ "$GAR_ENABLED" = "true" ]; then
              echo "-t $GAR_REGISTRY/$1:$IMAGE_TAG"
            fi
          }
          # Build non-dashboard images in parallel.
          (
            cd apps/testing
            docker buildx build --platform linux/arm64/v8,linux/amd64 \
              -t $ECR_REGISTRY/akto-api-testing:$IMAGE_TAG \
              $(gar_tag akto-api-testing) \
              . --push
          ) &
          PID_TESTING=$!
          (
            cd apps/billing
            docker buildx build --platform linux/arm64/v8,linux/amd64 \
              -t $ECR_REGISTRY/akto-billing:$IMAGE_TAG \
              $(gar_tag akto-billing) \
              . --push
          ) &
          PID_BILLING=$!
          (
            cd apps/internal
            docker buildx build --platform linux/arm64/v8,linux/amd64 \
              -t $ECR_REGISTRY/akto-internal:$IMAGE_TAG \
              $(gar_tag akto-internal) \
              . --push
          ) &
          PID_INTERNAL=$!
          (
            cd apps/threat-detection
            docker buildx build --platform linux/arm64/v8,linux/amd64 \
              -t $ECR_REGISTRY/akto-threat-detection:$IMAGE_TAG \
              $(gar_tag akto-threat-detection) \
              . --push
          ) &
          PID_THREAT=$!
          (
            cd apps/threat-detection-backend
            docker buildx build --platform linux/arm64/v8,linux/amd64 \
              -t $ECR_REGISTRY/akto-threat-detection-backend:$IMAGE_TAG \
              $(gar_tag akto-threat-detection-backend) \
              . --push
          ) &
          PID_THREAT_BACKEND=$!
          (
            cd apps/account-job-executor
            docker buildx build --platform linux/arm64/v8,linux/amd64 \
              -t $ECR_REGISTRY/akto-account-job-executor:$IMAGE_TAG \
              $(gar_tag akto-account-job-executor) \
              . --push
          ) &
          PID_ACCOUNT_EXECUTOR=$!
          (
            cd apps/data-ingestion-service
            docker buildx build --platform linux/arm64/v8,linux/amd64 \
              -t $ECR_REGISTRY/data-ingestion-service:$IMAGE_TAG \
              $(gar_tag data-ingestion-service) \
              . --push
          ) &
          PID_DATA_INGESTION=$!

          if [ "${{ github.event_name }}" != "workflow_dispatch" ] || [ "${{ github.event.inputs.skipFrontendBuild }}" != "true" ]; then
            aws s3 sync ./apps/dashboard/web/polaris_web/web/dist s3://dashboard-on-cdn/polaris_web/$IMAGE_TAG/dist --delete
          fi
          (
            cd apps/dashboard
            docker buildx build --platform linux/arm64/v8,linux/amd64 \
              -t $ECR_REGISTRY/$ECR_REPOSITORY-dashboard:$IMAGE_TAG \
              $(gar_tag $ECR_REPOSITORY-dashboard) \
              . --push
          )

          wait $PID_TESTING $PID_BILLING $PID_INTERNAL $PID_THREAT $PID_THREAT_BACKEND $PID_ACCOUNT_EXECUTOR $PID_DATA_INGESTION

      - name: Cache Maven packages
        uses: actions/cache@v4
        with:
          path: ~/.m2
          key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-m2

  build-guardrails-service:
    if: |
      (github.event_name == 'pull_request_review' && github.event.pull_request.base.ref == 'master' && github.event.review.state == 'approved') ||
      (github.event_name == 'workflow_dispatch' && (github.event.inputs.target == 'all' || github.event.inputs.target == 'guardrails-service'))
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v2
      - name: Convert github branch name to be compatible with docker tag name convention and generate tag name
        id: docker_tag
        run: echo "IMAGE_TAG=a-$(echo ${{ github.ref_name }} | sed 's/[^a-zA-Z0-9]/-/g')" >> $GITHUB_OUTPUT
      - name: DockerHub login
        env:
          DOCKER_USERNAME: ${{secrets.DOCKER_USERNAME}}
          DOCKER_PASSWORD: ${{secrets.DOCKER_PASSWORD}}
        run: |
          docker login -u $DOCKER_USERNAME -p $DOCKER_PASSWORD
      - name: Authenticate to Google Cloud
        if: vars.GCP_PROJECT_ID != ''
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}
      - name: Set up Cloud SDK
        if: vars.GCP_PROJECT_ID != ''
        uses: google-github-actions/setup-gcloud@v2
      - name: Configure Docker for Artifact Registry
        if: vars.GCP_PROJECT_ID != ''
        run: gcloud auth configure-docker ${{ env.GCP_REGION }}-docker.pkg.dev --quiet
      - name: Build and push guardrails-service
        env:
          ECR_REGISTRY: aktosecurity
          IMAGE_TAG: ${{ steps.docker_tag.outputs.IMAGE_TAG }}
          GAR_ENABLED: ${{ vars.GCP_PROJECT_ID != '' }}
        run: |
          echo $IMAGE_TAG >> $GITHUB_STEP_SUMMARY
          cd apps/guardrails-service/container/src
          go test ./...
          cd ..
          docker buildx create --use
          cd apps/guardrails-service/container
          chmod +x setup-netrc.sh
          # token expires in 1 year [2026-12-17]
          GITHUB_TOKEN=${{ secrets.AKTO_GITHUB_TOKEN }} ./setup-netrc.sh
          GAR_TAG=""
          if [ "$GAR_ENABLED" = "true" ]; then
            GAR_TAG="-t $GAR_REGISTRY/guardrails-service:$IMAGE_TAG"
          fi
          docker buildx build --platform linux/arm64/v8,linux/amd64 \
            -t $ECR_REGISTRY/guardrails-service:$IMAGE_TAG \
            $GAR_TAG \
            . --push

  build-agent-guard:
    if: |
      (github.event_name == 'pull_request_review' && github.event.pull_request.base.ref == 'master' && github.event.review.state == 'approved') ||
      (github.event_name == 'workflow_dispatch' && contains(fromJSON('["all","agent-guard","agent-guard-worker","agent-guard-anonymizer","agent-guard-embedder"]'), github.event.inputs.target))
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v2
      - name: Convert github branch name to be compatible with docker tag name convention and generate tag name
        id: docker_tag
        run: echo "IMAGE_TAG=a-$(echo ${{ github.ref_name }} | sed 's/[^a-zA-Z0-9]/-/g')" >> $GITHUB_OUTPUT
      - name: DockerHub login
        env:
          DOCKER_USERNAME: ${{secrets.DOCKER_USERNAME}}
          DOCKER_PASSWORD: ${{secrets.DOCKER_PASSWORD}}
        run: |
          docker login -u $DOCKER_USERNAME -p $DOCKER_PASSWORD
      - name: Authenticate to Google Cloud
        if: vars.GCP_PROJECT_ID != ''
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}
      - name: Set up Cloud SDK
        if: vars.GCP_PROJECT_ID != ''
        uses: google-github-actions/setup-gcloud@v2
      - name: Configure Docker for Artifact Registry
        if: vars.GCP_PROJECT_ID != ''
        run: gcloud auth configure-docker ${{ env.GCP_REGION }}-docker.pkg.dev --quiet
      - name: Build and push agent-guard images
        env:
          ECR_REGISTRY: aktosecurity
          IMAGE_TAG: ${{ steps.docker_tag.outputs.IMAGE_TAG }}
          GAR_ENABLED: ${{ vars.GCP_PROJECT_ID != '' }}
          BUILD_WORKER: ${{ github.event_name == 'pull_request_review' || contains(fromJSON('["all","agent-guard","agent-guard-worker"]'), github.event.inputs.target) }}
          BUILD_ANONYMIZER: ${{ github.event_name == 'pull_request_review' || contains(fromJSON('["all","agent-guard","agent-guard-anonymizer"]'), github.event.inputs.target) }}
          BUILD_EMBEDDER: ${{ github.event_name == 'pull_request_review' || contains(fromJSON('["all","agent-guard","agent-guard-embedder"]'), github.event.inputs.target) }}
        run: |
          set -euo pipefail
          echo "$IMAGE_TAG" >> $GITHUB_STEP_SUMMARY
          docker buildx create --use
          gar_tag() {
            if [ "$GAR_ENABLED" = "true" ]; then
              echo "-t $GAR_REGISTRY/$1:$IMAGE_TAG"
            fi
          }
          PIDS=()
          if [ "$BUILD_WORKER" = "true" ]; then
            (
              docker buildx build --platform linux/arm64/v8,linux/amd64 \
                -t $ECR_REGISTRY/akto-agent-guard-worker:$IMAGE_TAG \
                $(gar_tag akto-agent-guard-worker) \
                apps/agent-guard/python-service/worker-py --push
            ) &
            PIDS+=($!)
          fi
          if [ "$BUILD_ANONYMIZER" = "true" ]; then
            (
              docker buildx build --platform linux/arm64/v8,linux/amd64 \
                -t $ECR_REGISTRY/akto-agent-guard-anonymizer:$IMAGE_TAG \
                $(gar_tag akto-agent-guard-anonymizer) \
                apps/agent-guard/python-service/anonymizer-container --push
            ) &
            PIDS+=($!)
          fi
          if [ "$BUILD_EMBEDDER" = "true" ]; then
            (
              docker buildx build --platform linux/arm64/v8,linux/amd64 \
                -t $ECR_REGISTRY/akto-agent-guard-embedder:$IMAGE_TAG \
                $(gar_tag akto-agent-guard-embedder) \
                apps/agent-guard/python-service/embedder-container --push
            ) &
            PIDS+=($!)
          fi
          if [ ${#PIDS[@]} -gt 0 ]; then
            wait "${PIDS[@]}"
          fi