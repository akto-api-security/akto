name: Staging

env:
  GCP_REGION: ${{ vars.GCP_REGION || 'us-central1' }}
  GAR_REGISTRY: ${{ vars.GCP_REGION || 'us-central1' }}-docker.pkg.dev/${{ vars.GCP_PROJECT_ID }}/${{ vars.GCP_ARTIFACT_REGISTRY_REPO }}

# Controls when the workflow will run
on:
  push:
    branches: [master]
  pull_request_review:
    types: [ submitted ]
  workflow_dispatch:
    inputs:
      dashboard:
        type: boolean
        default: false
        description: Dashboard
      testing:
        type: boolean
        default: false
        description: Testing
      billing:
        type: boolean
        default: false
        description: Billing
      internal:
        type: boolean
        default: false
        description: Internal
      threat_detection:
        type: boolean
        default: false
        description: Threat Detection
      threat_detection_backend:
        type: boolean
        default: false
        description: Threat Detection Backend
      account_job_executor:
        type: boolean
        default: false
        description: Account Job Executor
      data_ingestion:
        type: boolean
        default: false
        description: Data Ingestion Service
      guardrails_service:
        type: boolean
        default: false
        description: Guardrails Service
      otel_ingestion_service:
        type: boolean
        default: false
        description: OTel Ingestion Service
      agent_guard_worker:
        type: boolean
        default: false
        description: Agent Guard Worker
      agent_guard_anonymizer:
        type: boolean
        default: false
        description: Agent Guard Anonymizer
      agent_guard_embedder:
        type: boolean
        default: false
        description: Agent Guard Embedder
      skipTests:
        type: boolean
        default: false
        description: >-
          [Options] Skip unit tests — Java modules only
          (Dashboard, Testing, Billing, Internal, Threat Detection,
          Threat Detection Backend, Account Job Executor, Data Ingestion).
          Does not apply to Guardrails, OTel, or Agent Guard.
      skipFrontendBuild:
        type: boolean
        default: false
        description: >-
          [Options] Skip dashboard frontend build and S3 sync — Dashboard only

jobs:
  resolve-modules:
    if: |
      (github.event_name == 'pull_request_review' && github.event.pull_request.base.ref == 'master' && github.event.review.state == 'approved') ||
      (github.event_name == 'workflow_dispatch')
    runs-on: ubuntu-22.04
    outputs:
      dashboard: ${{ steps.resolve.outputs.dashboard }}
      testing: ${{ steps.resolve.outputs.testing }}
      billing: ${{ steps.resolve.outputs.billing }}
      internal: ${{ steps.resolve.outputs.internal }}
      threat_detection: ${{ steps.resolve.outputs.threat_detection }}
      threat_detection_backend: ${{ steps.resolve.outputs.threat_detection_backend }}
      account_job_executor: ${{ steps.resolve.outputs.account_job_executor }}
      data_ingestion: ${{ steps.resolve.outputs.data_ingestion }}
      guardrails_service: ${{ steps.resolve.outputs.guardrails_service }}
      otel_ingestion_service: ${{ steps.resolve.outputs.otel_ingestion_service }}
      agent_guard_worker: ${{ steps.resolve.outputs.agent_guard_worker }}
      agent_guard_anonymizer: ${{ steps.resolve.outputs.agent_guard_anonymizer }}
      agent_guard_embedder: ${{ steps.resolve.outputs.agent_guard_embedder }}
      any_main: ${{ steps.resolve.outputs.any_main }}
    steps:
      - uses: actions/checkout@v6
        if: github.event_name == 'pull_request_review'
        with:
          fetch-depth: 0

      - name: Resolve modules to build
        id: resolve
        run: |
          set -euo pipefail

          set_out() {
            echo "$1=$2" >> "$GITHUB_OUTPUT"
          }

          dashboard=false
          testing=false
          billing=false
          internal=false
          threat_detection=false
          threat_detection_backend=false
          account_job_executor=false
          data_ingestion=false
          guardrails_service=false
          otel_ingestion_service=false
          agent_guard_worker=false
          agent_guard_anonymizer=false
          agent_guard_embedder=false

          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            dashboard="${{ github.event.inputs.dashboard }}"
            testing="${{ github.event.inputs.testing }}"
            billing="${{ github.event.inputs.billing }}"
            internal="${{ github.event.inputs.internal }}"
            threat_detection="${{ github.event.inputs.threat_detection }}"
            threat_detection_backend="${{ github.event.inputs.threat_detection_backend }}"
            account_job_executor="${{ github.event.inputs.account_job_executor }}"
            data_ingestion="${{ github.event.inputs.data_ingestion }}"
            guardrails_service="${{ github.event.inputs.guardrails_service }}"
            otel_ingestion_service="${{ github.event.inputs.otel_ingestion_service }}"
            agent_guard_worker="${{ github.event.inputs.agent_guard_worker }}"
            agent_guard_anonymizer="${{ github.event.inputs.agent_guard_anonymizer }}"
            agent_guard_embedder="${{ github.event.inputs.agent_guard_embedder }}"
          else
            BASE="${{ github.event.pull_request.base.sha }}"
            HEAD="${{ github.event.pull_request.head.sha }}"
            CHANGED=$(git diff --name-only "$BASE"..."$HEAD")
            echo "Changed files:"
            echo "$CHANGED"

            path_hit() {
              echo "$CHANGED" | grep -qE "$1"
            }

            SHARED=false
            if path_hit '^(libs/|pom\.xml$|apps/pom\.xml$)'; then
              SHARED=true
            fi

            bool_or_shared() {
              if [ "$SHARED" = "true" ] || path_hit "$1"; then
                echo true
              else
                echo false
              fi
            }

            dashboard="$(bool_or_shared '^apps/dashboard/')"
            testing="$(bool_or_shared '^apps/testing/')"
            billing="$(bool_or_shared '^apps/billing/')"
            internal="$(bool_or_shared '^apps/internal/')"
            threat_detection="$(bool_or_shared '^apps/threat-detection/')"
            threat_detection_backend="$(bool_or_shared '^apps/threat-detection-backend/')"
            account_job_executor="$(bool_or_shared '^apps/account-job-executor/')"
            data_ingestion="$(bool_or_shared '^apps/data-ingestion-service/')"

            if path_hit '^apps/guardrails-service/'; then
              guardrails_service=true
            fi
            if path_hit '^apps/otel-ingestion-service/'; then
              otel_ingestion_service=true
            fi

            if path_hit '^apps/agent-guard/python-service/worker-py/'; then
              agent_guard_worker=true
            fi
            if path_hit '^apps/agent-guard/python-service/anonymizer-container/'; then
              agent_guard_anonymizer=true
            fi
            if path_hit '^apps/agent-guard/python-service/embedder-container/'; then
              agent_guard_embedder=true
            fi
            # Shared agent-guard paths (deploy/, anonymizer-worker/, top-level files, etc.)
            OTHER_AG=$(echo "$CHANGED" | grep '^apps/agent-guard/' | grep -vE '^apps/agent-guard/python-service/(worker-py|anonymizer-container|embedder-container)/' || true)
            if [ -n "$OTHER_AG" ]; then
              agent_guard_worker=true
              agent_guard_anonymizer=true
              agent_guard_embedder=true
            fi
          fi

          any_main=false
          if [ "$dashboard" = "true" ] || [ "$testing" = "true" ] || [ "$billing" = "true" ] || [ "$internal" = "true" ] || \
             [ "$threat_detection" = "true" ] || [ "$threat_detection_backend" = "true" ] || \
             [ "$account_job_executor" = "true" ] || [ "$data_ingestion" = "true" ]; then
            any_main=true
          fi

          set_out dashboard "$dashboard"
          set_out testing "$testing"
          set_out billing "$billing"
          set_out internal "$internal"
          set_out threat_detection "$threat_detection"
          set_out threat_detection_backend "$threat_detection_backend"
          set_out account_job_executor "$account_job_executor"
          set_out data_ingestion "$data_ingestion"
          set_out guardrails_service "$guardrails_service"
          set_out otel_ingestion_service "$otel_ingestion_service"
          set_out agent_guard_worker "$agent_guard_worker"
          set_out agent_guard_anonymizer "$agent_guard_anonymizer"
          set_out agent_guard_embedder "$agent_guard_embedder"
          set_out any_main "$any_main"
          echo "Resolved modules: dashboard=$dashboard testing=$testing billing=$billing internal=$internal threat_detection=$threat_detection threat_detection_backend=$threat_detection_backend account_job_executor=$account_job_executor data_ingestion=$data_ingestion guardrails=$guardrails_service otel=$otel_ingestion_service agent_guard_worker=$agent_guard_worker agent_guard_anonymizer=$agent_guard_anonymizer agent_guard_embedder=$agent_guard_embedder any_main=$any_main"

  # Java modules only — skip for guardrails / otel / agent-guard
  check-dao-migration:
    needs: resolve-modules
    if: |
      always() && !cancelled() && (
        github.event_name == 'push' ||
        (needs.resolve-modules.result == 'success' && needs.resolve-modules.outputs.any_main == 'true')
      )
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Check DAO migration
        if: ${{ !contains(github.event.pull_request.labels.*.name, 'skip-dao-migration-check') }}
        run: |
          if [ -n "${{ github.event.pull_request.base.sha }}" ]; then
            BASE=${{ github.event.pull_request.base.sha }}
            HEAD=${{ github.event.pull_request.head.sha }}
          else
            # push / workflow_dispatch have no PR context - diff against the
            # previous commit on this ref instead.
            BASE=$(git rev-parse HEAD^ 2>/dev/null || git rev-list --max-parents=0 HEAD)
            HEAD=${{ github.sha }}
          fi

          # Only schema-affecting additions count, not any edit to a DAO file
          # (e.g. business-logic-only changes like an upsert-vs-update branch).
          SCHEMA_TOUCHED=$(git diff -U0 "$BASE"..."$HEAD" \
              -- 'libs/dao/src/main/java/com/akto/dao/*.java' 'libs/dao/src/main/java/com/akto/DaoInit.java' \
            | grep -E '^\+' \
            | grep -E 'createIndex|createIndicesIfAbsent|createUniqueIndex|createCollection|dropIndex|dropCollection|renameCollection|convertToCappedCollection|compactCollection' || true)
          if [ -z "$SCHEMA_TOUCHED" ]; then
            exit 0
          fi

          MIGRATION_ADDED=$(git diff --name-only --diff-filter=A "$BASE"..."$HEAD" \
            | grep -E "^libs/utils/src/main/resources/db/changelog/(common|billing|account)/.*\.xml$" || true)
          if [ -z "$MIGRATION_ADDED" ]; then
            echo "This change adds/changes an index or collection but no migration file was added under db/changelog/common|billing|account/. See libs/utils/src/main/resources/db/changelog/README.md."
            exit 1
          fi

          echo "Migration check passed: $MIGRATION_ADDED"

      - name: Send failure notification to Slack
        if: failure()
        uses: slackapi/slack-github-action@v1.23.0
        with:
          payload: |
            {
              "text": "❌ DAO migration check failed on Staging (${{ github.event_name }}, ${{ github.sha }}). Build blocked."
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK

  # One Maven package for all selected Java modules, then parallel docker pushes
  package-java:
    needs: [resolve-modules, check-dao-migration]
    if: |
      always() && !cancelled() &&
      needs.resolve-modules.outputs.any_main == 'true' &&
      needs.check-dao-migration.result == 'success'
    runs-on: ubuntu-22.04
    outputs:
      IMAGE_TAG: ${{ steps.docker_tag.outputs.IMAGE_TAG }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with:
          distribution: "temurin"
          java-version: "17"
          architecture: x64
      - uses: actions/setup-node@v6
        with:
          node-version: "17"
      - name: Cache Maven packages
        uses: actions/cache@v5
        with:
          path: ~/.m2
          key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-m2
      - name: Setup Protoc
        uses: arduino/setup-protoc@v3
        with:
          version: "29.2"
          repo-token: ${{ secrets.GITHUB_TOKEN }}
      - uses: bufbuild/buf-action@v1
        with:
          setup_only: true
      - name: Convert github branch name to be compatible with docker tag name convention and generate tag name
        id: docker_tag
        run: echo "IMAGE_TAG=a-$(echo ${{ github.ref_name }} | sed 's/[^a-zA-Z0-9]/-/g')" >> $GITHUB_OUTPUT
      - name: Download Akto templates zip and PII files
        if: needs.resolve-modules.outputs.dashboard == 'true'
        working-directory: ./apps/dashboard/src/main/resources
        run: |
          wget -O tests-library-master.zip https://github.com/akto-api-security/tests-library/archive/refs/heads/master.zip
          wget -O general.json https://raw.githubusercontent.com/akto-api-security/pii-types/master/general.json
          wget -O fintech.json https://raw.githubusercontent.com/akto-api-security/akto/master/pii-types/fintech.json
          wget -O filetypes.json https://raw.githubusercontent.com/akto-api-security/akto/master/pii-types/filetypes.json
      - name: Create maxmind directory (threat-detection-backend)
        if: needs.resolve-modules.outputs.threat_detection_backend == 'true'
        run: mkdir -p ./apps/threat-detection-backend/src/main/resources/maxmind
      - name: Download Maxmind Country database (threat-detection-backend)
        if: needs.resolve-modules.outputs.threat_detection_backend == 'true'
        working-directory: ./apps/threat-detection-backend/src/main/resources/maxmind
        run: |
          wget -O Geo-Country.mmdb https://raw.githubusercontent.com/akto-api-security/tests-library/refs/heads/master/resources/Geo-Country.mmdb
      - name: Create maxmind directory (utils)
        if: needs.resolve-modules.outputs.threat_detection == 'true' || needs.resolve-modules.outputs.threat_detection_backend == 'true' || needs.resolve-modules.outputs.dashboard == 'true'
        run: mkdir -p ./libs/utils/src/main/resources/maxmind
      - name: Download Maxmind Country database (utils)
        if: needs.resolve-modules.outputs.threat_detection == 'true' || needs.resolve-modules.outputs.threat_detection_backend == 'true' || needs.resolve-modules.outputs.dashboard == 'true'
        working-directory: ./libs/utils/src/main/resources/maxmind
        run: |
          wget -O Geo-Country.mmdb https://raw.githubusercontent.com/akto-api-security/tests-library/refs/heads/master/resources/Geo-Country.mmdb
      - name: Configure AWS Credentials (dashboard only)
        if: needs.resolve-modules.outputs.dashboard == 'true'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{secrets.AWS_ACCESS_KEY_ID}}
          aws-secret-access-key: ${{secrets.AWS_SECRET_ACCESS_KEY}}
          aws-region: ap-south-1
      - name: Download dashboard static assets
        if: needs.resolve-modules.outputs.dashboard == 'true'
        run: bash apps/dashboard/scripts/download-dashboard-vendor-assets.sh
      - name: Build Dashboard polaris UI
        if: needs.resolve-modules.outputs.dashboard == 'true' && (github.event_name != 'workflow_dispatch' || github.event.inputs.skipFrontendBuild != 'true')
        working-directory: ./apps/dashboard/web/polaris_web
        run: |
          npm install
          RELEASE_VERSION=${{ steps.docker_tag.outputs.IMAGE_TAG }} npm run build
      - name: Sync dashboard frontend to S3
        if: needs.resolve-modules.outputs.dashboard == 'true' && (github.event_name != 'workflow_dispatch' || github.event.inputs.skipFrontendBuild != 'true')
        run: aws s3 sync ./apps/dashboard/web/polaris_web/web/dist s3://dashboard-on-cdn/polaris_web/${{ steps.docker_tag.outputs.IMAGE_TAG }}/dist --delete
      - name: Run mvn package
        if: github.event_name != 'workflow_dispatch' || github.event.inputs.skipTests != 'true'
        run: mvn package -Dakto-image-tag=${{ steps.docker_tag.outputs.IMAGE_TAG }} -Dakto-build-time=$(eval "date +%s") -Dakto-release-version=${{steps.docker_tag.outputs.IMAGE_TAG}}
      - name: Run mvn package (skip tests)
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.skipTests == 'true'
        run: mvn package -Dakto-image-tag=${{ steps.docker_tag.outputs.IMAGE_TAG }} -Dakto-build-time=$(eval "date +%s") -Dakto-release-version=${{steps.docker_tag.outputs.IMAGE_TAG}} -DskipTests
      - name: Pack Java docker contexts
        env:
          BUILD_DASHBOARD: ${{ needs.resolve-modules.outputs.dashboard }}
          BUILD_TESTING: ${{ needs.resolve-modules.outputs.testing }}
          BUILD_BILLING: ${{ needs.resolve-modules.outputs.billing }}
          BUILD_INTERNAL: ${{ needs.resolve-modules.outputs.internal }}
          BUILD_THREAT: ${{ needs.resolve-modules.outputs.threat_detection }}
          BUILD_THREAT_BACKEND: ${{ needs.resolve-modules.outputs.threat_detection_backend }}
          BUILD_ACCOUNT_EXECUTOR: ${{ needs.resolve-modules.outputs.account_job_executor }}
          BUILD_DATA_INGESTION: ${{ needs.resolve-modules.outputs.data_ingestion }}
        run: |
          set -euo pipefail
          paths=()
          add_files() {
            local dir="$1"
            shift
            paths+=("$dir/Dockerfile")
            for f in "$@"; do
              if [ ! -e "$dir/$f" ]; then
                echo "Missing required file: $dir/$f"
                exit 1
              fi
              paths+=("$dir/$f")
            done
          }
          [ "$BUILD_DASHBOARD" = "true" ] && add_files apps/dashboard target/dashboard.war entrypoint.sh set_xmx.sh
          [ "$BUILD_TESTING" = "true" ] && add_files apps/testing target/testing-1.0-SNAPSHOT-jar-with-dependencies.jar start.sh
          [ "$BUILD_BILLING" = "true" ] && add_files apps/billing target/billing.war
          [ "$BUILD_INTERNAL" = "true" ] && add_files apps/internal target/internal.war
          [ "$BUILD_THREAT" = "true" ] && add_files apps/threat-detection target/threat-detection-1.0-SNAPSHOT-jar-with-dependencies.jar start.sh
          [ "$BUILD_THREAT_BACKEND" = "true" ] && add_files apps/threat-detection-backend target/threat-detection-backend-1.0-SNAPSHOT-jar-with-dependencies.jar
          [ "$BUILD_ACCOUNT_EXECUTOR" = "true" ] && add_files apps/account-job-executor target/account-job-executor-1.0-SNAPSHOT-jar-with-dependencies.jar start.sh
          [ "$BUILD_DATA_INGESTION" = "true" ] && add_files apps/data-ingestion-service target/data-ingestion-service.war docker
          tar czf java-docker-contexts.tar.gz "${paths[@]}"
          ls -lh java-docker-contexts.tar.gz
          tar tzf java-docker-contexts.tar.gz | head -50
      - uses: actions/upload-artifact@v4
        with:
          name: java-docker-contexts
          path: java-docker-contexts.tar.gz
          retention-days: 1

  build-java:
    needs: [resolve-modules, package-java]
    if: needs.resolve-modules.outputs.any_main == 'true'
    strategy:
      fail-fast: false
      matrix:
        include:
          - flag: dashboard
            context: apps/dashboard
            image: akto-api-security-dashboard
          - flag: testing
            context: apps/testing
            image: akto-api-testing
          - flag: billing
            context: apps/billing
            image: akto-billing
          - flag: internal
            context: apps/internal
            image: akto-internal
          - flag: threat_detection
            context: apps/threat-detection
            image: akto-threat-detection
          - flag: threat_detection_backend
            context: apps/threat-detection-backend
            image: akto-threat-detection-backend
          - flag: account_job_executor
            context: apps/account-job-executor
            image: akto-account-job-executor
          - flag: data_ingestion
            context: apps/data-ingestion-service
            image: data-ingestion-service
    runs-on: ubuntu-22.04
    steps:
      - name: Skip if module not selected
        id: should_build
        run: |
          case "${{ matrix.flag }}" in
            dashboard) FLAG="${{ needs.resolve-modules.outputs.dashboard }}" ;;
            testing) FLAG="${{ needs.resolve-modules.outputs.testing }}" ;;
            billing) FLAG="${{ needs.resolve-modules.outputs.billing }}" ;;
            internal) FLAG="${{ needs.resolve-modules.outputs.internal }}" ;;
            threat_detection) FLAG="${{ needs.resolve-modules.outputs.threat_detection }}" ;;
            threat_detection_backend) FLAG="${{ needs.resolve-modules.outputs.threat_detection_backend }}" ;;
            account_job_executor) FLAG="${{ needs.resolve-modules.outputs.account_job_executor }}" ;;
            data_ingestion) FLAG="${{ needs.resolve-modules.outputs.data_ingestion }}" ;;
          esac
          echo "run=$FLAG" >> "$GITHUB_OUTPUT"
          if [ "$FLAG" != "true" ]; then
            echo "Skipping ${{ matrix.image }} (not selected)"
          fi
      - uses: actions/download-artifact@v4
        if: steps.should_build.outputs.run == 'true'
        with:
          name: java-docker-contexts
      - name: Extract docker context
        if: steps.should_build.outputs.run == 'true'
        run: tar xzf java-docker-contexts.tar.gz
      - name: DockerHub login
        if: steps.should_build.outputs.run == 'true'
        env:
          DOCKER_USERNAME: ${{secrets.DOCKER_USERNAME}}
          DOCKER_PASSWORD: ${{secrets.DOCKER_PASSWORD}}
        run: |
          docker login -u $DOCKER_USERNAME -p $DOCKER_PASSWORD
      - name: Authenticate to Google Cloud
        if: steps.should_build.outputs.run == 'true' && vars.GCP_PROJECT_ID != ''
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}
      - name: Set up Cloud SDK
        if: steps.should_build.outputs.run == 'true' && vars.GCP_PROJECT_ID != ''
        uses: google-github-actions/setup-gcloud@v2
      - name: Configure Docker for Artifact Registry
        if: steps.should_build.outputs.run == 'true' && vars.GCP_PROJECT_ID != ''
        run: gcloud auth configure-docker ${{ env.GCP_REGION }}-docker.pkg.dev --quiet
      - name: Build and push ${{ matrix.image }}
        if: steps.should_build.outputs.run == 'true'
        env:
          ECR_REGISTRY: aktosecurity
          IMAGE_TAG: ${{ needs.package-java.outputs.IMAGE_TAG }}
          GAR_ENABLED: ${{ vars.GCP_PROJECT_ID != '' }}
          IMAGE_NAME: ${{ matrix.image }}
          CONTEXT: ${{ matrix.context }}
        run: |
          set -euo pipefail
          echo "$IMAGE_TAG" >> $GITHUB_STEP_SUMMARY
          docker buildx create --use
          GAR_TAG=""
          if [ "$GAR_ENABLED" = "true" ]; then
            GAR_TAG="-t $GAR_REGISTRY/$IMAGE_NAME:$IMAGE_TAG"
          fi
          docker buildx build --platform linux/arm64/v8,linux/amd64 \
            -t $ECR_REGISTRY/$IMAGE_NAME:$IMAGE_TAG \
            $GAR_TAG \
            "$CONTEXT" --push

  build-guardrails-service:
    needs: resolve-modules
    if: needs.resolve-modules.outputs.guardrails_service == 'true'
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v6
      - name: Convert github branch name to be compatible with docker tag name convention and generate tag name
        id: docker_tag
        run: echo "IMAGE_TAG=a-$(echo ${{ github.ref_name }} | sed 's/[^a-zA-Z0-9]/-/g')" >> $GITHUB_OUTPUT
      - name: DockerHub login
        env:
          DOCKER_USERNAME: ${{secrets.DOCKER_USERNAME}}
          DOCKER_PASSWORD: ${{secrets.DOCKER_PASSWORD}}
        run: |
          docker login -u $DOCKER_USERNAME -p $DOCKER_PASSWORD
      - name: Authenticate to Google Cloud
        if: vars.GCP_PROJECT_ID != ''
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}
      - name: Set up Cloud SDK
        if: vars.GCP_PROJECT_ID != ''
        uses: google-github-actions/setup-gcloud@v2
      - name: Configure Docker for Artifact Registry
        if: vars.GCP_PROJECT_ID != ''
        run: gcloud auth configure-docker ${{ env.GCP_REGION }}-docker.pkg.dev --quiet
      - name: Build and push guardrails-service
        env:
          ECR_REGISTRY: aktosecurity
          IMAGE_TAG: ${{ steps.docker_tag.outputs.IMAGE_TAG }}
          GAR_ENABLED: ${{ vars.GCP_PROJECT_ID != '' }}
        run: |
          echo $IMAGE_TAG >> $GITHUB_STEP_SUMMARY
          docker buildx create --use
          cd apps/guardrails-service/container
          chmod +x setup-netrc.sh
          # token expires in 1 year [2026-12-17]
          GITHUB_TOKEN=${{ secrets.AKTO_GITHUB_TOKEN }} ./setup-netrc.sh
          GAR_TAG=""
          if [ "$GAR_ENABLED" = "true" ]; then
            GAR_TAG="-t $GAR_REGISTRY/guardrails-service:$IMAGE_TAG"
          fi
          docker buildx build --platform linux/arm64/v8,linux/amd64 \
            -t $ECR_REGISTRY/guardrails-service:$IMAGE_TAG \
            $GAR_TAG \
            . --push

  build-otel-ingestion-service:
    needs: resolve-modules
    if: needs.resolve-modules.outputs.otel_ingestion_service == 'true'
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v6
      - name: Convert github branch name to be compatible with docker tag name convention and generate tag name
        id: docker_tag
        run: echo "IMAGE_TAG=a-$(echo ${{ github.ref_name }} | sed 's/[^a-zA-Z0-9]/-/g')" >> $GITHUB_OUTPUT
      - name: DockerHub login
        env:
          DOCKER_USERNAME: ${{secrets.DOCKER_USERNAME}}
          DOCKER_PASSWORD: ${{secrets.DOCKER_PASSWORD}}
        run: |
          docker login -u $DOCKER_USERNAME -p $DOCKER_PASSWORD
      - name: Build and push otel-ingestion-service
        env:
          ECR_REGISTRY: aktosecurity
          IMAGE_TAG: ${{ steps.docker_tag.outputs.IMAGE_TAG }}
        run: |
          echo $IMAGE_TAG >> $GITHUB_STEP_SUMMARY
          docker buildx create --use
          cd apps/otel-ingestion-service/container
          chmod +x ../../guardrails-service/container/setup-netrc.sh
          GITHUB_TOKEN=${{ secrets.AKTO_GITHUB_TOKEN }} ../../guardrails-service/container/setup-netrc.sh
          docker buildx build --platform linux/arm64/v8,linux/amd64 -t $ECR_REGISTRY/otel-ingestion-service:$IMAGE_TAG . --push

  build-agent-guard:
    needs: resolve-modules
    if: |
      needs.resolve-modules.outputs.agent_guard_worker == 'true' ||
      needs.resolve-modules.outputs.agent_guard_anonymizer == 'true' ||
      needs.resolve-modules.outputs.agent_guard_embedder == 'true'
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: worker
            flag: agent_guard_worker
            context: apps/agent-guard/python-service/worker-py
            image: akto-agent-guard-worker
          - name: anonymizer
            flag: agent_guard_anonymizer
            context: apps/agent-guard/python-service/anonymizer-container
            image: akto-agent-guard-anonymizer
          - name: embedder
            flag: agent_guard_embedder
            context: apps/agent-guard/python-service/embedder-container
            image: akto-agent-guard-embedder
    runs-on: ubuntu-22.04
    steps:
      - name: Skip if module not selected
        id: should_build
        run: |
          case "${{ matrix.flag }}" in
            agent_guard_worker) FLAG="${{ needs.resolve-modules.outputs.agent_guard_worker }}" ;;
            agent_guard_anonymizer) FLAG="${{ needs.resolve-modules.outputs.agent_guard_anonymizer }}" ;;
            agent_guard_embedder) FLAG="${{ needs.resolve-modules.outputs.agent_guard_embedder }}" ;;
          esac
          echo "run=$FLAG" >> "$GITHUB_OUTPUT"
          if [ "$FLAG" != "true" ]; then
            echo "Skipping ${{ matrix.name }} (not selected)"
          fi
      - uses: actions/checkout@v6
        if: steps.should_build.outputs.run == 'true'
      - name: Convert github branch name to be compatible with docker tag name convention and generate tag name
        if: steps.should_build.outputs.run == 'true'
        id: docker_tag
        run: echo "IMAGE_TAG=a-$(echo ${{ github.ref_name }} | sed 's/[^a-zA-Z0-9]/-/g')" >> $GITHUB_OUTPUT
      - name: DockerHub login
        if: steps.should_build.outputs.run == 'true'
        env:
          DOCKER_USERNAME: ${{secrets.DOCKER_USERNAME}}
          DOCKER_PASSWORD: ${{secrets.DOCKER_PASSWORD}}
        run: |
          docker login -u $DOCKER_USERNAME -p $DOCKER_PASSWORD
      - name: Authenticate to Google Cloud
        if: steps.should_build.outputs.run == 'true' && vars.GCP_PROJECT_ID != ''
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}
      - name: Set up Cloud SDK
        if: steps.should_build.outputs.run == 'true' && vars.GCP_PROJECT_ID != ''
        uses: google-github-actions/setup-gcloud@v2
      - name: Configure Docker for Artifact Registry
        if: steps.should_build.outputs.run == 'true' && vars.GCP_PROJECT_ID != ''
        run: gcloud auth configure-docker ${{ env.GCP_REGION }}-docker.pkg.dev --quiet
      - name: Build and push ${{ matrix.image }}
        if: steps.should_build.outputs.run == 'true'
        env:
          ECR_REGISTRY: aktosecurity
          IMAGE_TAG: ${{ steps.docker_tag.outputs.IMAGE_TAG }}
          GAR_ENABLED: ${{ vars.GCP_PROJECT_ID != '' }}
          IMAGE_NAME: ${{ matrix.image }}
          CONTEXT: ${{ matrix.context }}
        run: |
          set -euo pipefail
          echo "$IMAGE_TAG" >> $GITHUB_STEP_SUMMARY
          docker buildx create --use
          GAR_TAG=""
          if [ "$GAR_ENABLED" = "true" ]; then
            GAR_TAG="-t $GAR_REGISTRY/$IMAGE_NAME:$IMAGE_TAG"
          fi
          docker buildx build --platform linux/arm64/v8,linux/amd64 \
            -t $ECR_REGISTRY/$IMAGE_NAME:$IMAGE_TAG \
            $GAR_TAG \
            "$CONTEXT" --push
