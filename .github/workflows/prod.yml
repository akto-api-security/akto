name: Production

# Controls when the workflow will run
on:
  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:
    inputs:
      release_version:
        description: 'Release version for the deployment'
      skipTests:
        description: 'Do you want to skip unit tests?'
        required: true
        default: 'False'
        type: choice
        options:
          - 'False'
          - 'True'
      dashboard:
        type: boolean
        default: true
        description: Dashboard
      testing:
        type: boolean
        default: true
        description: Testing
      billing:
        type: boolean
        default: true
        description: Billing
      internal:
        type: boolean
        default: true
        description: Internal
      agent_traffic_analyzer:
        type: boolean
        default: false
        description: Agent Traffic Analyzer
      guardrails_service:
        type: boolean
        default: false
        description: Guardrails Service
      otel_ingestion_service:
        type: boolean
        default: false
        description: OTel Ingestion Service
      release_version_agent_guard:
        description: 'Release version for the Agent Guard deployment'
        required: false
      agent_guard:
        type: boolean
        default: false
        description: Agent Guard
      agent_guard_deploy_azure:
        type: boolean
        default: false
        description: Deploy Agent Guard to Azure Container Apps (requires Agent Guard build)
      account_jobs_executor:
        type: boolean
        default: false
        description: Account Jobs Executor Service
      release_version_threat:
        description: 'Release version for the Threat Detection deployment'
        required: false
      threat_detection:
        type: boolean
        default: false
        description: Threat Detection Client
      threat_detection_backend:
        type: boolean
        default: false
        description: Threat Detection Backend
      release_version_data_ingestion:
        description: 'Release version for the Data Ingestion deployment'
        required: false
      data_ingestion:
        type: boolean
        default: false
        description: Data Ingestion Service


# A workflow run is made up of one or more jobs that can run sequentially or in parallel
jobs:
  # This workflow contains a single job called "build"
  build-akto:
    # The type of runner that the job will run on
    runs-on: ubuntu-22.04
    if: ${{ github.event.inputs.dashboard == 'true' || github.event.inputs.testing == 'true' || github.event.inputs.billing == 'true' || github.event.inputs.internal == 'true'}}

    # Steps represent a sequence of tasks that will be executed as part of the job
    steps:
      # Checks-out your repository under $GITHUB_WORKSPACE, so your job can access it
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Check DAO Migration
        run: |
          # Other components (agent-guard-*, threat-*, data-ingestion-*, etc.) push tags
          # into this same repo, so only bare-version tags (dashboard's own) count as BASE.
          BASE=$(git tag --merged HEAD --sort=-creatordate | grep -E '^v?[0-9]+(\.[0-9]+)+$' | head -n1)
          if [ -z "$BASE" ]; then
            BASE=$(git rev-list --max-parents=0 HEAD)
          fi
          HEAD=${{ github.sha }}

          DAO_CHANGED=$(git diff --name-only --diff-filter=AM "$BASE"..."$HEAD" \
            | grep -E "^libs/dao/src/main/java/com/akto/(dao/.*|DaoInit\.java)$" || true)
          if [ -z "$DAO_CHANGED" ]; then
            exit 0
          fi

          MIGRATION_ADDED=$(git diff --name-only --diff-filter=A "$BASE"..."$HEAD" \
            | grep -E "^libs/utils/src/main/resources/db/changelog/(common|billing|account)/.*\.xml$" || true)
          if [ -z "$MIGRATION_ADDED" ]; then
            echo "DAO changed since last release ($BASE) but no migration file added under db/changelog/common|billing|account/."
            exit 1
          fi

          echo "Migration check passed: $MIGRATION_ADDED"
      - name: Send failure notification to Slack
        if: failure()
        uses: slackapi/slack-github-action@v1.23.0
        with:
          payload: |
            {
              "text": "❌ DAO migration check failed for Akto Open Source v${{ github.event.inputs.release_version }} release! Production build blocked."
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK

      - uses: actions/setup-java@v5
        with:
          distribution: "adopt"
          java-version: "8"
          architecture: x64
      - uses: actions/setup-node@v6
        with:
          node-version: '17'
      - name: Setup Protoc
        uses: arduino/setup-protoc@v3
        with:
          version: "29.2"
          repo-token: ${{ secrets.GITHUB_TOKEN }}
      - uses: bufbuild/buf-action@v1
        with:
          setup_only: true
      - name: Download Akto templates zip and PII files
        working-directory: ./apps/dashboard/src/main/resources
        run: |
          wget -O tests-library-master.zip https://github.com/akto-api-security/tests-library/archive/refs/heads/master.zip
          wget -O general.json https://raw.githubusercontent.com/akto-api-security/pii-types/master/general.json
          wget -O fintech.json https://raw.githubusercontent.com/akto-api-security/akto/master/pii-types/fintech.json
          wget -O filetypes.json https://raw.githubusercontent.com/akto-api-security/akto/master/pii-types/filetypes.json
          wget -O automated_api_groups.csv https://raw.githubusercontent.com/akto-api-security/akto/master/automated-api-groups/automated-api-groups.csv

      - name: Download dashboard static assets
        run: bash apps/dashboard/scripts/download-dashboard-vendor-assets.sh

      - name: Prepare Dashboard polaris UI
        working-directory: ./apps/dashboard/web/polaris_web
        run: npm install && export RELEASE_VERSION=${{github.event.inputs.release_version}} && npm run build
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v1
        with:
          aws-access-key-id: ${{secrets.AWS_ACCESS_KEY_ID}}
          aws-secret-access-key: ${{secrets.AWS_SECRET_ACCESS_KEY}}
          aws-region: ap-south-1

      - name: Deploy polaris site to S3 bucket
        run: aws s3 sync ./apps/dashboard/web/polaris_web/web/dist s3://dashboard-on-cdn/polaris_web/${{github.event.inputs.release_version}}/dist --delete
      - name: Run mvn package
        if: ${{github.event.inputs.skipTests == 'False' }}
        run: mvn package -Dakto-image-tag=${{ github.event.inputs.release_version }} -Dakto-build-time=$(eval "date +%s") -Dakto-release-version=${{github.event.inputs.release_version}}
      - name: Run mvn package dangerously
        if: ${{github.event.inputs.skipTests== 'True' }}
        run: mvn package -Dakto-image-tag=${{ github.event.inputs.release_version }} -Dakto-build-time=$(eval "date +%s") -Dakto-release-version=${{github.event.inputs.release_version}} -DskipTests
      - name: Send mvn notification to Slack
        id: slack-mvn
        if: ${{github.event.inputs.skipTests== 'True' }}
        uses: slackapi/slack-github-action@v1.23.0
        with:
          payload: |
            {
              "text": "⚠️ Releasing Akto Open Source v${{ github.event.inputs.release_version }}, after skipping unit tests"
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK
      - name: DockerHub login
        env:
          DOCKER_USERNAME: ${{secrets.DOCKER_USERNAME}}
          DOCKER_PASSWORD: ${{secrets.DOCKER_PASSWORD}}
        run: |
          docker login -u $DOCKER_USERNAME -p $DOCKER_PASSWORD

      - name: Build, tag, and push the image to DockerHub
        id: build-image-dockerhub
        env:
          ECR_REGISTRY: aktosecurity
          ECR_REPOSITORY: akto-api-security
          IMAGE_TAG_1: local
          IMAGE_TAG_2: ${{ github.event.inputs.release_version }}_local
        run: |
          docker buildx create --use
          # Build a docker container and push it to DockerHub
          cd apps/dashboard
          if [[ "${{ github.event.inputs.dashboard }}" == "true" ]]; then
            cd ../dashboard
            docker buildx build --platform linux/arm64/v8,linux/amd64 -t $ECR_REGISTRY/$ECR_REPOSITORY-dashboard:$IMAGE_TAG_1 -t $ECR_REGISTRY/$ECR_REPOSITORY-dashboard:$IMAGE_TAG_2 . --push
            echo "::set-output name=image::$ECR_REGISTRY/$ECR_REPOSITORY-dashboard:$IMAGE_TAG"
          fi

          if [[ "${{ github.event.inputs.testing }}" == "true" ]]; then
            cd ../testing
            docker buildx build --platform linux/arm64/v8,linux/amd64 -t $ECR_REGISTRY/akto-api-testing:$IMAGE_TAG_1 -t $ECR_REGISTRY/akto-api-testing:$IMAGE_TAG_2 . --push
            echo "::set-output name=image::$ECR_REGISTRY/akto-api-testing:$IMAGE_TAG"
          fi

          if [[ "${{ github.event.inputs.billing }}" == "true" ]]; then
            cd ../billing
            docker buildx build --platform linux/arm64/v8,linux/amd64 -t $ECR_REGISTRY/akto-billing:$IMAGE_TAG_1 -t $ECR_REGISTRY/akto-billing:$IMAGE_TAG_2 . --push
            echo "::set-output name=image::$ECR_REGISTRY/akto-billing:$IMAGE_TAG"
          fi

          if [[ "${{ github.event.inputs.internal }}" == "true" ]]; then
            cd ../internal
            docker buildx build --platform linux/arm64/v8,linux/amd64 -t $ECR_REGISTRY/akto-internal:$IMAGE_TAG_1 -t $ECR_REGISTRY/akto-internal:$IMAGE_TAG_2 . --push
            echo "::set-output name=image::$ECR_REGISTRY/akto-internal:$IMAGE_TAG"
          fi

      - name: Configure AWS Credentials for ECR
        uses: aws-actions/configure-aws-credentials@v1
        with:
          aws-access-key-id: ${{secrets.AWS_ACCESS_KEY_ID}}
          aws-secret-access-key: ${{secrets.AWS_SECRET_ACCESS_KEY}}
          aws-region: us-east-1
      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v1
        with:
          mask-password: "true"
          registry-type: public

      - name: Push git tag
        id: tag_version
        uses: mathieudutour/github-tag-action@v6.1
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          custom_tag: ${{ github.event.inputs.release_version }}
      - name: Create a GitHub release
        uses: ncipollo/release-action@v1.12.0
        with:
          tag: ${{ steps.tag_version.outputs.new_tag }}
          name: Release ${{ steps.tag_version.outputs.new_tag }}
          omitBody: true
      - name: Send Github release notification to Slack
        id: slack
        uses: slackapi/slack-github-action@v1.23.0
        with:
          payload: |
            {
              "text": "🚀 Akto Open Source v${{ github.event.inputs.release_version }} released!"
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK
      - name: Set up JDK 11
        uses: actions/setup-java@v5
        with:
          distribution: "adopt"
          java-version: 11
      - name: Cache SonarCloud packages
        uses: actions/cache@v5
        with:
          path: ~/.sonar/cache
          key: ${{ runner.os }}-sonar
          restore-keys: ${{ runner.os }}-sonar
      - name: Cache Maven packages
        uses: actions/cache@v5
        with:
          path: ~/.m2
          key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-m2

  build-agent-traffic-analyzer:
    # The type of runner that the job will run on
    runs-on: ubuntu-22.04
    if: ${{ github.event.inputs.agent_traffic_analyzer == 'true' }}

    # Steps represent a sequence of tasks that will be executed as part of the job
    steps:
      # Checks-out your repository under $GITHUB_WORKSPACE, so your job can access it
      - uses: actions/checkout@v6
      
      - name: DockerHub login
        env:
          DOCKER_USERNAME: ${{secrets.DOCKER_USERNAME}}
          DOCKER_PASSWORD: ${{secrets.DOCKER_PASSWORD}}
        run: |
          docker login -u $DOCKER_USERNAME -p $DOCKER_PASSWORD

      - name: Build, tag, and push the image to DockerHub
        id: build-image-dockerhub
        env:
          ECR_REGISTRY: aktosecurity
          IMAGE_VERSION: ${{ github.event.inputs.release_version }}
        run: |
          docker buildx create --use
          cd apps/agent-traffic-analyzer
          docker buildx build --platform linux/arm64/v8,linux/amd64 -t $ECR_REGISTRY/agent-traffic-analyzer:local -t $ECR_REGISTRY/agent-traffic-analyzer:$IMAGE_VERSION . --push
          echo "::set-output name=image::$ECR_REGISTRY/agent-traffic-analyzer:$IMAGE_VERSION"
          echo "::notice title=Azure Deployment::Image built with version $IMAGE_VERSION. To deploy to Azure, manually run 'Agent Traffic Analyzer - Azure Deployment' workflow with version: $IMAGE_VERSION"

      - name: Configure AWS Credentials for ECR
        uses: aws-actions/configure-aws-credentials@v1
        with:
          aws-access-key-id: ${{secrets.AWS_ACCESS_KEY_ID}}
          aws-secret-access-key: ${{secrets.AWS_SECRET_ACCESS_KEY}}
          aws-region: us-east-1
      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v1
        with:
          mask-password: "true"
          registry-type: public

      - name: Push git tag
        id: tag_version
        uses: mathieudutour/github-tag-action@v6.1
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          custom_tag: agent-traffic-analyzer-${{ github.event.inputs.release_version }}
      - name: Create a GitHub release
        uses: ncipollo/release-action@v1.12.0
        with:
          tag: ${{ steps.tag_version.outputs.new_tag }}
          name: Release ${{ steps.tag_version.outputs.new_tag }}
          omitBody: true
      - name: Send Github release notification to Slack
        id: slack
        uses: slackapi/slack-github-action@v1.23.0
        with:
          payload: |
            {
              "text": "🔍 Agent Traffic Analyzer v${{ github.event.inputs.release_version }} released!"
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK

  build-guardrails-service:
    runs-on: ubuntu-22.04
    if: ${{ github.event.inputs.guardrails_service == 'true' }}

    steps:
      - uses: actions/checkout@v6

      - name: DockerHub login
        env:
          DOCKER_USERNAME: ${{secrets.DOCKER_USERNAME}}
          DOCKER_PASSWORD: ${{secrets.DOCKER_PASSWORD}}
        run: |
          docker login -u $DOCKER_USERNAME -p $DOCKER_PASSWORD

      - name: Build, tag, and push the image to DockerHub
        id: build-image-dockerhub
        env:
          ECR_REGISTRY: aktosecurity
          IMAGE_VERSION: ${{ github.event.inputs.release_version }}
          IMAGE_TAG_1: local
        run: |
          docker buildx create --use
          cd apps/guardrails-service/container
          chmod +x setup-netrc.sh
          # token expires in 1 year [2026-12-17]
          GITHUB_TOKEN=${{ secrets.AKTO_GITHUB_TOKEN }} ./setup-netrc.sh
          docker buildx build --platform linux/arm64/v8,linux/amd64 -t $ECR_REGISTRY/guardrails-service:$IMAGE_TAG_1 -t $ECR_REGISTRY/guardrails-service:$IMAGE_VERSION . --push
          echo "::set-output name=image::$ECR_REGISTRY/guardrails-service:$IMAGE_VERSION"

      - name: Configure AWS Credentials for ECR
        uses: aws-actions/configure-aws-credentials@v1
        with:
          aws-access-key-id: ${{secrets.AWS_ACCESS_KEY_ID}}
          aws-secret-access-key: ${{secrets.AWS_SECRET_ACCESS_KEY}}
          aws-region: us-east-1

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v1
        with:
          mask-password: "true"
          registry-type: public

      - name: Push git tag
        id: tag_version
        uses: mathieudutour/github-tag-action@v6.1
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          custom_tag: guardrails-service-${{ github.event.inputs.release_version }}

      - name: Create a GitHub release
        uses: ncipollo/release-action@v1.12.0
        with:
          tag: ${{ steps.tag_version.outputs.new_tag }}
          name: Release ${{ steps.tag_version.outputs.new_tag }}
          omitBody: true

      - name: Send Github release notification to Slack
        id: slack
        uses: slackapi/slack-github-action@v1.23.0
        with:
          payload: |
            {
              "text": "🛡️ Guardrails Service v${{ github.event.inputs.release_version }} released!"
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK

  build-otel-ingestion-service:
    runs-on: ubuntu-22.04
    if: ${{ github.event.inputs.otel_ingestion_service == 'true' }}

    steps:
      - uses: actions/checkout@v6

      - name: DockerHub login
        env:
          DOCKER_USERNAME: ${{secrets.DOCKER_USERNAME}}
          DOCKER_PASSWORD: ${{secrets.DOCKER_PASSWORD}}
        run: |
          docker login -u $DOCKER_USERNAME -p $DOCKER_PASSWORD

      - name: Build, tag, and push the image to DockerHub
        id: build-image-dockerhub
        env:
          ECR_REGISTRY: aktosecurity
          IMAGE_VERSION: ${{ github.event.inputs.release_version }}
          IMAGE_TAG_1: local
        run: |
          docker buildx create --use
          cd apps/otel-ingestion-service/container
          chmod +x ../../guardrails-service/container/setup-netrc.sh
          GITHUB_TOKEN=${{ secrets.AKTO_GITHUB_TOKEN }} ../../guardrails-service/container/setup-netrc.sh
          docker buildx build --platform linux/arm64/v8,linux/amd64 -t $ECR_REGISTRY/otel-ingestion-service:$IMAGE_TAG_1 -t $ECR_REGISTRY/otel-ingestion-service:$IMAGE_VERSION . --push
          echo "::set-output name=image::$ECR_REGISTRY/otel-ingestion-service:$IMAGE_VERSION"

      - name: Configure AWS Credentials for ECR
        uses: aws-actions/configure-aws-credentials@v1
        with:
          aws-access-key-id: ${{secrets.AWS_ACCESS_KEY_ID}}
          aws-secret-access-key: ${{secrets.AWS_SECRET_ACCESS_KEY}}
          aws-region: us-east-1

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v1
        with:
          mask-password: "true"
          registry-type: public

      - name: Push git tag
        id: tag_version
        uses: mathieudutour/github-tag-action@v6.1
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          custom_tag: otel-ingestion-service-${{ github.event.inputs.release_version }}

      - name: Create a GitHub release
        uses: ncipollo/release-action@v1.12.0
        with:
          tag: ${{ steps.tag_version.outputs.new_tag }}
          name: Release ${{ steps.tag_version.outputs.new_tag }}
          omitBody: true

      - name: Send Github release notification to Slack
        id: slack
        uses: slackapi/slack-github-action@v1.23.0
        with:
          payload: |
            {
              "text": "📡 OTel Ingestion Service v${{ github.event.inputs.release_version }} released!"
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK

  build-agent-guard:
    runs-on: ubuntu-22.04
    if: ${{ github.event.inputs.agent_guard == 'true' }}

    steps:
      - uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: DockerHub login
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Configure AWS Credentials for ECR
        uses: aws-actions/configure-aws-credentials@v1
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v1
        with:
          mask-password: "true"
          registry-type: public

      - name: Build and push worker image (portable FastAPI)
        uses: docker/build-push-action@v4
        with:
          context: ./apps/agent-guard/python-service/worker-py
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            aktosecurity/akto-agent-guard-worker:local
            aktosecurity/akto-agent-guard-worker:${{ github.event.inputs.release_version_agent_guard }}
            ${{ steps.login-ecr.outputs.registry }}/p7q3h0z2/akto-agent-guard-worker:local
            ${{ steps.login-ecr.outputs.registry }}/p7q3h0z2/akto-agent-guard-worker:${{ github.event.inputs.release_version_agent_guard }}
          cache-from: type=gha,scope=agent-guard-worker
          cache-to: type=gha,mode=max,scope=agent-guard-worker

      - name: Build and push anonymizer image
        uses: docker/build-push-action@v4
        with:
          context: ./apps/agent-guard/python-service/anonymizer-container
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            aktosecurity/akto-agent-guard-anonymizer:local
            aktosecurity/akto-agent-guard-anonymizer:${{ github.event.inputs.release_version_agent_guard }}
            ${{ steps.login-ecr.outputs.registry }}/p7q3h0z2/akto-agent-guard-anonymizer:local
            ${{ steps.login-ecr.outputs.registry }}/p7q3h0z2/akto-agent-guard-anonymizer:${{ github.event.inputs.release_version_agent_guard }}
          cache-from: type=gha,scope=agent-guard-anonymizer
          cache-to: type=gha,mode=max,scope=agent-guard-anonymizer

      - name: Build and push embedder image
        uses: docker/build-push-action@v4
        with:
          context: ./apps/agent-guard/python-service/embedder-container
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            aktosecurity/akto-agent-guard-embedder:local
            aktosecurity/akto-agent-guard-embedder:${{ github.event.inputs.release_version_agent_guard }}
            ${{ steps.login-ecr.outputs.registry }}/p7q3h0z2/akto-agent-guard-embedder:local
            ${{ steps.login-ecr.outputs.registry }}/p7q3h0z2/akto-agent-guard-embedder:${{ github.event.inputs.release_version_agent_guard }}
          cache-from: type=gha,scope=agent-guard-embedder
          cache-to: type=gha,mode=max,scope=agent-guard-embedder

      - name: Push git tag
        id: tag_version
        uses: mathieudutour/github-tag-action@v6.1
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          custom_tag: agent-guard-${{ github.event.inputs.release_version_agent_guard }}

      - name: Create a GitHub release
        uses: ncipollo/release-action@v1.12.0
        with:
          tag: ${{ steps.tag_version.outputs.new_tag }}
          name: Release ${{ steps.tag_version.outputs.new_tag }}
          omitBody: true

      - name: Send Github release notification to Slack
        id: slack
        uses: slackapi/slack-github-action@v1.23.0
        with:
          payload: |
            {
              "text": "🚀 Agent Guard v${{ github.event.inputs.release_version_agent_guard }} released (worker + anonymizer + embedder) and pushed to DockerHub & ECR!"
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK

      - name: Send failure notification to Slack
        if: failure()
        uses: slackapi/slack-github-action@v1.23.0
        with:
          payload: |
            {
              "text": "❌ Agent Guard build v${{ github.event.inputs.release_version_agent_guard }} failed! Check the workflow for details."
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK

  build-account-jobs-executor-service:
    runs-on: ubuntu-22.04
    if: ${{ github.event.inputs.account_jobs_executor == 'true' }}

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-java@v5
        with:
          distribution: "adopt"
          java-version: "8"
          architecture: x64

      - name: Setup Protoc
        uses: arduino/setup-protoc@v3
        with:
          version: "29.2"
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - uses: bufbuild/buf-action@v1
        with:
          setup_only: true

      - name: Run mvn package
        if: ${{github.event.inputs.skipTests == 'False' }}
        run: mvn package -Dakto-image-tag=${{ github.event.inputs.release_version}} -Dakto-build-time=$(eval "date +%s") -Dakto-release-version=${{github.event.inputs.release_version}}

      - name: Run mvn package dangerously
        if: ${{github.event.inputs.skipTests== 'True' }}
        run: mvn package -Dakto-image-tag=${{ github.event.inputs.release_version }} -Dakto-build-time=$(eval "date +%s") -Dakto-release-version=${{github.event.inputs.release_version}} -DskipTests

      - name: DockerHub login
        env:
          DOCKER_USERNAME: ${{secrets.DOCKER_USERNAME}}
          DOCKER_PASSWORD: ${{secrets.DOCKER_PASSWORD}}
        run: |
          docker login -u $DOCKER_USERNAME -p $DOCKER_PASSWORD

      - name: Build, tag, and push the image to DockerHub
        id: build-image-dockerhub
        env:
          ECR_REGISTRY: aktosecurity
          IMAGE_VERSION: ${{ github.event.inputs.release_version }}
          IMAGE_VERSION_LATEST: latest
        run: |
          docker buildx create --use
          # Build a docker container and push it to DockerHub
          cd apps/dashboard
          cd ../account-job-executor
          docker buildx build --platform linux/arm64/v8,linux/amd64 -t $ECR_REGISTRY/akto-account-job-executor:$IMAGE_VERSION -t $ECR_REGISTRY/akto-account-job-executor:$IMAGE_VERSION_LATEST . --push
      
      - name: Configure AWS Credentials for ECR
        uses: aws-actions/configure-aws-credentials@v1
        with:
          aws-access-key-id: ${{secrets.AWS_ACCESS_KEY_ID}}
          aws-secret-access-key: ${{secrets.AWS_SECRET_ACCESS_KEY}}
          aws-region: us-east-1

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v1
        with:
          mask-password: "true"
          registry-type: public

      - name: Push git tag
        id: tag_version
        uses: mathieudutour/github-tag-action@v6.1
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          custom_tag: account-jobs-executor-service-${{ github.event.inputs.release_version }}

      - name: Create a GitHub release
        uses: ncipollo/release-action@v1.12.0
        with:
          tag: ${{ steps.tag_version.outputs.new_tag }}
          name: Release ${{ steps.tag_version.outputs.new_tag }}
          omitBody: true

      - name: Send Github release notification to Slack
        id: slack
        uses: slackapi/slack-github-action@v1.23.0
        with:
          payload: |
            {
              "text": "Account Jobs Executor Service v${{ github.event.inputs.release_version }} released!"
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK

